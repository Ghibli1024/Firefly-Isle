name: deploy

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to deploy
        required: false
        default: main
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Export build env from wrangler.jsonc
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const config = JSON.parse(fs.readFileSync('wrangler.jsonc', 'utf8'))
          const vars = config.vars ?? {}
          const lines = Object.entries(vars)
            .filter(([key]) => key.startsWith('VITE_'))
            .map(([key, value]) => `${key}=${String(value)}`)
            .join('\n')
          fs.appendFileSync(process.env.GITHUB_ENV, `${lines}\n`)
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Fetch main
        run: git fetch origin main --depth=1

      - name: Ensure deployment source belongs to main
        run: |
          DEPLOY_SHA="$(git rev-parse HEAD)"
          echo "DEPLOY_SHA=${DEPLOY_SHA}" >> "$GITHUB_ENV"
          if ! git merge-base --is-ancestor "${DEPLOY_SHA}" origin/main; then
            echo "Ref ${DEPLOY_SHA} is not reachable from origin/main"
            exit 1
          fi

      - name: Build app
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: c38f90a65a89c28653e8b8d19739277f
          command: pages deploy dist --project-name firefly-isle --branch main
